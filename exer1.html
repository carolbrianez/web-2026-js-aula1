<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('btn_calcular');
            botao.addEventListener('click', calculo);
        }

        function calculo() {
            let saida = document.getElementById('resultado');
            saida.innerHTML = area(4);
        }

        function area(raio) {
            let y = Math.PI * raio * raio;
            return y;
        }
    </script>
</head>

<body>
    <h1>Aperte o botão</h1>
    <p id="resultado">Área do círculo...</p>
    <button id="btn_calcular">Área</button>
</body>

</html>
